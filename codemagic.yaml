workflows:
  ios-simulator:
    name: iOS Simulator Build (Appetize.io)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      # ── Step 1: Disable Swift Package Manager BEFORE flutter pub get ─────────
      - name: Disable Swift Package Manager
        script: flutter config --no-enable-swift-package-manager

      # ── Step 2: Fetch Dart/Flutter dependencies ──────────────────────────────
      - name: Get Flutter packages
        script: flutter pub get

      # ── Step 3: Clean stale CocoaPods cache ──────────────────────────────────
      - name: Clean CocoaPods cache
        script: |
          cd ios
          rm -rf Pods
          rm -f Podfile.lock

      # ── Step 4: Update CocoaPods repository index ────────────────────────────
      - name: Update CocoaPods repo
        script: pod repo update

      # ── Step 5: Install CocoaPods dependencies ───────────────────────────────
      - name: Install pods
        script: |
          cd ios
          pod install

      # ── Step 6: Build the iOS Simulator App ──────────────────────────────────
      - name: Build iOS Simulator
        script: flutter build ios --simulator --debug

    artifacts:
      - build/ios/iphonesimulator/Runner.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - raushandubey2005@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      # ── Step 1: Disable Swift Package Manager BEFORE flutter pub get ─────────
      - name: Disable Swift Package Manager
        script: flutter config --no-enable-swift-package-manager

      # ── Step 2: Fetch Dart/Flutter dependencies ──────────────────────────────
      - name: Get Flutter packages
        script: flutter pub get

      # ── Step 3: Clean stale CocoaPods cache that may cause "spec not found" ──
      - name: Clean CocoaPods cache
        script: |
          cd ios
          rm -rf Pods
          rm -f Podfile.lock

      # ── Step 4: Update CocoaPods repository index ────────────────────────────
      - name: Update CocoaPods repo
        script: pod repo update

      # ── Step 5: Install CocoaPods dependencies ───────────────────────────────
      - name: Install pods
        script: |
          cd ios
          pod install
        working_directory: $CM_BUILD_DIR

      # ── Step 6: Build the iOS app ─────────────────────────────────────────────
      - name: Build iOS
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - raushandubey2005@gmail.com
        notify:
          success: true
          failure: true
